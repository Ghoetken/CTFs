  Notes:
    - 02/27/2025: The target doesn't ever have the same day. In fact, it seems like some days he tends to completely flip bits of his routine. For example, one day he would work early in the morning,
    and the next he would be working late at night. He also went days where he would meet colleagues, and then days when he wouldn't leave the compound. I don't know if he's aware he's being watched.
    - 03/14/2025: The target participated in sinister baseball game with his evil henchmen. While watching, I thought he would only run a couple bases, but it turns out his henchmen allowed him to run
    10 bases. Although he's evil, I was impressed by his baseball prowess.
    - 04/01/2025: The target seems to ahead of the schedule we predicted. We thought the attack on Washington, DC was planned for 04/07/2025, but it seems that things are moving a little more quickly
    and the attack will be on 04/03/2025, 4 days ahead of schedule.
    - 04/09/2025: I saw on the news that the target's attack on Washington, DC was thwarted, unfortunately so did he, and now he's angry. He's moving hundreds of troops to mount up a more serious
    attack on the United States. From what I can tell, he's shifting 13 of his best officers westward to meet up with his forces on the West shore.
    - 05/18/2025: I am close to taking down the target now but he's becoming more cautious. He went to the evil base 64 times in the past week, each time bringing an army of protection with him.
    I think he knows something is about to happen. There might be mole within the team relaying my notes him...
