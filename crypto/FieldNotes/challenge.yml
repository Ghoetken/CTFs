name: Field Notes
description: |
  Our team has captured an encrypted message from an adversary, but we don't know what it says. We had a field agent following the target for a few weeks until the trail went cold, and 
  then we intercepted this message. All we have is the message and the agent's notes, can you figure out what the message says?

